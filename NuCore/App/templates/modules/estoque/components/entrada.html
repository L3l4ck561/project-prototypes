<div class="bg-white w-full rounded-3xl shadow-xl overflow-hidden">
    <!-- Form -->
    <form id="entry-form" class="p-8 space-y-5" autocomplete="off">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-3">
                Fármaco
            </label>

            <div class="flex items-center gap-3">
                <!-- Color Picker -->
                <input type="color" id="pharma-cor"
                    class="w-11 h-11 rounded-xl border border-slate-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-cyan-500">

                <!-- Input Principal -->
                <div class="flex-1 relative">
                    <input type="text" id="pharma" placeholder="Digite o nome do fármaco..."
                        class="w-full border border-slate-200 rounded-2xl px-5 py-3.5 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-100 outline-none text-base">

                    <!-- Lista de Sugestões -->
                    <ul id="list-pharma"
                        class="absolute z-50 w-full mt-5 bg-white rounded-2xl border border-slate-200 shadow-xl max-h-60 overflow-y-auto hidden divide-y divide-slate-100">
                        <!-- Preenchido via JavaScript -->
                    </ul>
                </div>

                <!-- Checkbox de Edição -->
                <div class="flex items-center gap-2 whitespace-nowrap hidden" id="pharma-edit-box">
                    <input type="checkbox" id="pharma-edit" class="w-5 h-5 accent-cyan-500 cursor-pointer">
                    <label for="pharma-edit" class="text-sm text-slate-600 cursor-pointer select-none">
                        Editar nome
                    </label>
                </div>
            </div>

            <!-- Mensagem auxiliar -->
            <p id="pharma-exit" class="text-slate-500 text-sm mt-1 min-h-[20px]" style="margin-left: 70px;"></p>
        </div>

        <div class="grid grid-cols-2 gap-5 mb-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Lote
                </label>
                <input type="text" id="batch" placeholder="TC240620"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Quantidade
                </label>
                <input type="number" id="quantity" placeholder="50"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Data de Recebimento
                </label>
                <input type="date" id="received"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Data de Validade
                </label>
                <input type="date" id="expiry"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div class="col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Observação sobre o lote
                </label>
                <textarea name="" id="obs"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none"
                    placeholder="..."></textarea>
            </div>

        </div>

        <!-- Footer -->
        <div class="flex justify-end gap-3 p-4 border-t border-slate-200">
            <p style="flex: 1;" id="status-post"></p>

            <button type="button" onclick="zerarTela()"
                class="px-5 py-3 border border-slate-200 rounded-2xl hover:bg-slate-50">
                Cancelar
            </button>

            <button type="submit" id="btnBox"
                class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 text-white rounded-2xl font-medium hidden">
                <i class="fa-solid fa-floppy-disk mr-2"></i>
                <span id="btn"></span>
            </button>

        </div>

    </form>
    
</div>
