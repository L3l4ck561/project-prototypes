<!-- Modal Nova Entrada -->

<div class="bg-white w-full rounded-3xl shadow-xl overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100 bg-slate-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-100 text-cyan-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-boxes-stacked"></i>
            </div>
            <div>
                <h2 class="text-2xl font-semibold text-slate-800">Nova Entrada</h2>
                <p class="text-sm text-slate-500">Registrar lote no estoque</p>
            </div>
        </div>

        <a href="/{{page}}"
            class="w-10 h-10 rounded-2xl hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors flex items-center justify-center">
            <i class="fa-solid fa-xmark text-xl"></i>
        </a>
    </div>

    <!-- Form -->
    <form id="entry-form" class="p-8 space-y-5" autocomplete="off">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Fármaco
            </label>
            <input type="text" id="pharma" placeholder="Nome do fármaco"
                class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
        </div>

        <div class="grid grid-cols-2 gap-5 mb-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Lote
                </label>
                <input type="text" id="batch" placeholder="TC240620"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Quantidade
                </label>
                <input type="number" id="quantity" placeholder="500"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Data de Recebimento
                </label>
                <input type="date" id="received"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Data de Validade
                </label>
                <input type="date" id="expiry"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
            </div>

            <div class="col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Observação sobre o lote
                </label>
                <textarea name="" id="obs"
                    class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none"
                    placeholder="..."></textarea>
            </div>

        </div>

        <!-- Footer -->
        <div class="flex justify-end gap-3 p-4 border-t border-slate-200">

            <button type="button" onclick="closeEntryModal()"
                class="px-5 py-3 border border-slate-200 rounded-2xl hover:bg-slate-50">
                Cancelar
            </button>

            <button type="submit" class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 text-white rounded-2xl font-medium">
                <i class="fa-solid fa-floppy-disk mr-2"></i>
                Salvar Entrada
            </button>

        </div>

    </form>

    <script src="{{ url_for('static', filename='scripts/estoque/entrada.js') }}"></script>
</div>
