<!-- Modal -->
<div id="stockModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden">

        <!-- Header -->
        <div class="bg-cyan-600 px-6 py-5 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <h2 id="modal-title" class="text-2xl font-semibold">Fármaco: Paracetamol 500mg</h2>
                    <p class="text-cyan-100 text-sm mt-1">Gerenciar saída de estoque</p>
                </div>
                <button onclick="closeModal()" class="text-white/80 hover:text-white text-3xl leading-none">×</button>
            </div>
        </div>

        <!-- Total Stock -->
        <div class="px-6 py-4 bg-gray-50 flex items-center gap-6">
            <div class="text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest">Total em Estoque</p>
                <p id="total-stock" class="text-4xl font-bold text-teal-600">248</p>
            </div>
            <div class="h-12 w-px bg-gray-300"></div>
            <div>
                <p class="text-sm text-gray-600">Unidades disponíveis para uso</p>
            </div>
        </div>

        <!-- Table -->
        <div class="p-6">
            <table class="w-full">
                <thead>
                    <tr class="border-b text-left text-sm text-gray-500">
                        <th class="pb-3 font-medium">Lote</th>
                        <th class="pb-3 font-medium text-center">Usados</th>
                        <th class="pb-3 font-medium text-right">Disponível</th>
                    </tr>
                </thead>
                <tbody id="lots-body" class="text-sm">
                    <!-- JS vai preencher aqui -->
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="px-6 py-5 bg-gray-50 flex flex-col sm:flex-row gap-4 items-center">
            <div class="flex-1">
                <label class="block text-xs text-gray-500 mb-1">Data de Uso</label>
                <input type="date" id="use-date"
                    class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-cyan-500">
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()"
                    class="px-6 py-3 text-gray-600 hover:bg-gray-100 rounded-2xl font-medium transition">
                    Fechar
                </button>
            </div>
        </div>
    </div>
</div>
