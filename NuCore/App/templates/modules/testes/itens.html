{% extends 'base.html' %}
{% block title %}Gerenciar Itens{% endblock %}
{% block content %}
    <div class="container">
        <h1>Gerenciar Itens</h1>
        
        <!-- Formulário de Cadastro -->
        <div class="card">
            <h3>Novo Item</h3>
            <form id="itemForm">
                <input type="text" id="nome" placeholder="Nome do item" required>
                <button type="submit">Salvar Item</button>
            </form>
        </div>

        <!-- Tabela -->
        <div class="card">
            <h3>Lista de Itens</h3>
            <table id="itensTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Item</h3>
            <input type="text" id="editNome" placeholder="Nome do item">
            <button onclick="saveEdit()">Salvar Alterações</button>
            <button onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='scripts/Itens.js') }}"></script>
{% endblock %}
