<!-- Modal Nova Entrada -->
<div id="entry-modal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-8 py-6 border-b border-slate-200">
            <div>
                <h2 class="text-2xl font-semibold text-slate-800">Nova Entrada</h2>
                <p class="text-sm text-slate-500">Registrar novo lote no estoque</p>
            </div>

            <button onclick="closeEntryModal()"
                class="w-10 h-10 rounded-xl hover:bg-slate-100 text-slate-500">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Form -->
        <form id="entry-form" class="p-8 space-y-5">

            <div class="grid grid-cols-2 gap-5">

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Fármaco
                    </label>
                    <select id="drug"
                        class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
                        <option>Technetium-99m</option>
                        <option>Fluorine-18</option>
                        <option>Iodine-131</option>
                        <option>Gallium-68</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Código
                    </label>
                    <input type="text"
                        id="code"
                        placeholder="TC-99M"
                        class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Lote
                    </label>
                    <input type="text"
                        id="batch"
                        placeholder="TC240620"
                        class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Quantidade (mCi)
                    </label>
                    <input type="number"
                        id="quantity"
                        placeholder="500"
                        class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Data de Validade
                    </label>
                    <input type="date"
                        id="expiry"
                        class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:border-cyan-500 outline-none">
                </div>

            </div>

            <!-- Footer -->
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">

                <button type="button"
                    onclick="closeEntryModal()"
                    class="px-5 py-3 border border-slate-200 rounded-2xl hover:bg-slate-50">
                    Cancelar
                </button>

                <button type="submit"
                    class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>
                    Salvar Entrada
                </button>

            </div>

        </form>

    </div>
</div>
